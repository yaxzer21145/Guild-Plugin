# Guild插件GUI配置文件

# 语言设置
language: zh_cn

# GUI设置
gui:
  # GUI大小 (9的倍数: 9, 18, 27, 36, 45, 54)
  size:
    main: 54
    all_guilds: 54
  
  # 物品设置
  items:
    # 无公会界面
    no_guild:
      barrier:
        material: BARRIER
        slot: 22
      create:
        material: DIAMOND
        slot: 11
      view_all:
        material: BOOK
        slot: 15
    
    # 所有公会界面
    all_guilds:
      guild_item:
        material: DIAMOND_BLOCK
      back:
        material: ARROW
        slot: 49
    
    # 成员界面
    member:
      info:
        material: PAPER
        slot: 10
      members:
        material: PLAYER_HEAD
        slot: 13
      settings:
        material: REDSTONE
        slot: 16
      leave:
        material: BARRIER
        slot: 31
      invite_toggle:
        material: LEVER
        slot: 28
      notify_toggle:
        material: NOTE_BLOCK
        slot: 34
      bank:
        material: GOLD_INGOT
        slot: 22
    
    # 管理员界面
    officer:
      manage:
        material: COMMAND_BLOCK
        slot: 37
    
    # 会长界面
    owner:
      manage:
        material: COMMAND_BLOCK
        slot: 37
      upgrade:
        material: EMERALD
        slot: 19
      buy_exp:
        material: EXPERIENCE_BOTTLE
        slot: 25
  
  # 颜色设置
  colors:
    owner: "&c"
    officer: "&6"
    member: "&a"
    online: "&a"
    offline: "&c"

# 多语言支持
